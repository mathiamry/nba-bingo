server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — toutes les routes renvoient sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets fingerprintés par Vite
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour le JSON des parties (régénéré régulièrement)
    location = /game.json {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;
}
