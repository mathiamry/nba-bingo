<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NBA Bingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Google Fonts en non-blocking : on charge la feuille en `media="print"`
      (donc inerte tant qu'on n'imprime pas), puis on bascule en
      `media="all"` une fois téléchargée. Le first paint n'est plus bloqué
      par le TTFB de fonts.googleapis.com. Combiné avec `display=swap`, les
      fontes apparaissent dès qu'elles arrivent.
      Montserrat trimé à 400/500/600/700 — seules graisses utilisées.
      Fallback <noscript> pour les rares navigateurs sans JS.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
